<!-- Update Employee Form -->
<form [formGroup]="updateFOrmGroup">

    <h4>Update Employee</h4>
    <div class="p-2">
        <div class="mb-2">
            <label for="name" class="me-2">Name:</label>
            <input type="text" id="name" formControlName="name" class="w-25">
        </div>
        <div class="mb-2">
            <label for="email" class="me-2">Email:</label>
            <input type="email" id="email" formControlName="email" class="w-25">
        </div>
        <button type="button" (click)="onUpdateEmployee()" [disabled]="!updateFOrmGroup.valid">Update Employee</button>
    </div>

</form>

<!-- Confirmation Dialog -->
<app-ok-cancel *ngIf="isShowDialog" (ok)="onOkayDialog()" (cancel)="onCancelDialog()" [title]="'Update Employee'"
    [message]="'Are you sure you want to update this employee?'">
</app-ok-cancel>
