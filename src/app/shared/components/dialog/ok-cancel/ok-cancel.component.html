<div class="dialog-backdrop">
    <div class="dialog">
        <h2>{{ title() }}</h2>
        <p>{{ message() }}</p>
        <div class="dialog-actions">
            <button (click)="onOkClick()" class="me-2">OK</button>
            <button (click)="onCancelClick()">Cancel</button>
        </div>
    </div>



</div>
